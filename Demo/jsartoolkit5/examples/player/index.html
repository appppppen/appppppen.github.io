<html>
    <body>
        <script src="babylon.2.5.max.js"></script>
        <script src="artoolkit.debug.js"></script>
        <script src="artoolkit.api.js"></script>
        <canvas id="renderCanvas"></canvas>
        <video id="video" width="320" height="240" loop=""
        controls="" autoplay="autoplay"
        muted="muted" playsinline="playsinline"
        webkit-playsinline></video>

        <script>
            var v = document.getElementById('video');
            var srcObjectF=false;
        //开启摄像头初始化
        var ua = navigator.userAgent;
        var isMob=/iPhone|iPad|Android/i.test(ua);
        

        var exfect=[];
        if (navigator && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.enumerateDevices()
                .then(function gotDevices(deviceInfos) {
                    for (var i = 0; i !== deviceInfos.length; ++i) {
                        var deviceInfo = deviceInfos[i];
                        if (deviceInfo.kind === 'videoinput') {
                            exfect.push(deviceInfo.deviceId);
                        }
                    }
            }).catch(function errorCallback(error) {
                console.log('navigator.getUserMedia error: ', error);
            });
        }

        function openCamera(id){
            var constraints = {audio: false, video: {deviceId: id}}
            if (navigator && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia(constraints).then(function success(stream) {
                    video.srcObject = stream;
                    console.log("success if");
                });
            } else{
                  navigator.getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
                  navigator.getUserMedia(constraints, function (stream) {
                    console.log("success else");
                    video.srcObject = stream; }, function (err) { });
              }
          }
            // get the canvas DOM element
            var canvas = document.getElementById('renderCanvas');
            canvas.height = v.height;
            canvas.width = v.width;
            // load the 3D engine
            var engine = new BABYLON.Engine(canvas, true);
            engine.setSize(v.width, v.height);
            var markerRoot;
            var camera;
            var createScene = function () {
                var scene = new BABYLON.Scene(engine);
                scene.useRightHandedSystem = true;
                camera = new BABYLON.Camera('camera1', new BABYLON.Vector3(0, 0, 0), scene);
                camera.attachControl(canvas, true);
                window.camera = camera;
                markerRoot = new BABYLON.AbstractMesh('markerRoot', scene);
                markerRoot.wasVisible = false;
                markerRoot.markerMatrix = new Float64Array(12);
                var light = new BABYLON.HemisphericLight('light1', new BABYLON.Vector3(0, 1, 0), scene);
                var box = BABYLON.Mesh.CreateBox('box1', 1, scene);
                box.parent = markerRoot;
                return scene;
            };
            var scene = createScene();
            var arController = null;
            engine.runRenderLoop(function () {
                if (!arController) {
                    return;
                }
                arController.detectMarker(v);
                var markerNum = arController.getMarkerNum();
                if ( exfect[this.front] && !this.srcObjectF && isMob || exfect[0] && !this.srcObjectF){
                            console.log("openCamera");
                            if(isMob){
                                openCamera(exfect[this.front],this.front);
                            }else{
                                openCamera(exfect[0],0);
                            }
                            this.srcObjectF=true;
                        }
                if (markerNum > 0) {

                    if (markerRoot.isVisible) {
                        arController.getTransMatSquareCont(0, 1, markerRoot.markerMatrix, markerRoot.markerMatrix);
                    } else {
                        arController.getTransMatSquare(
                            0 /* Marker index */, 
                            1 /* Marker width */, 
                            markerRoot.markerMatrix);
                    }
                    markerRoot.isVisible = true;
                    markerRoot.getChildMeshes().forEach(function (mesh) {mesh.isVisible = true});
                    arController.transMatToGLMat(markerRoot.markerMatrix, markerRoot._worldMatrix.m);
                } else {
                    markerRoot.isVisible = false;
                    markerRoot.getChildMeshes().forEach(function (mesh) {
                        mesh.isVisible = false;
                    });
                }
                arController.debugDraw();
                scene.render();
            });

            var cameraParam = new ARCameraParam();
            cameraParam.onload = function () {
                arController = new ARController(320, 240, cameraParam);
                arController.debugSetup();
                camera.freezeProjectionMatrix(BABYLON.Matrix.FromArray(arController.getCameraMatrix()));
            };
            cameraParam.load('Data/camera_para.dat');
            window.addEventListener('resize', function () {
                engine.resize();
            });
        </script>
    </body>
</html>
