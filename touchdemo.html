<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no">
    <script type="text/javascript" src="jquery.min.js"></script>
    <title>div块跟随手指拖动</title>
</head>
<body>
		<div id='showimg'>
            <div id='showimgA'><div id='showTxtA'>showTxtA</div></div>
            <div id='showimgB'><div id='showTxtB'>showTxtB</div></div>
            <img src="WarpAndLatitude.jpg" />
        </div>
    <style type="text/css">
        #id{
            width: 56px;
            height: 56px;
            background: #ccc;
            position: absolute;
            left: 0px;
            top: 100px;
        }
        #p {
        pointer-events:none;
    }
    
    #showimg {
        position: absolute;
        width:720px ;
        height: 360px;
        border-radius: 6px;
        color: #ffffff;
        /*display: none;*/
        z-index: 666;
        /* pointer-events:none; */
        /* background-image: url("../assets/img/WarpAndLatitude.jpg") */
    }

    #showimgA {
        position: absolute;
        top: 360px;
        left: 40px;
        width: 10px;
        height: 10px;
        padding: 0;
        margin: 0;
        z-index: 999;
        background-image: url("dots.png");
        /* pointer-events:none; */
    }

    #showimgB {
        position: absolute;
        top: 0px;
        left: 140px;
        width: 10px;
        height: 10px;
        padding: 0;
        margin: 0;
        z-index: 999;
        background-image: url("dots.png");
        /* pointer-events:none; */
    }

    #showTxtA {
        position: absolute;
        left: 20px;
        width: 220px;
        height: 40px;
        font-size: 14px;
        line-height: 40px;
        padding: 0;
        margin: 0;
        color: #ffff00;
        /* pointer-events:none; */
    }

    #showTxtB {
        position: absolute;
        left: 20px;
        width: 220px;
        height: 40px;
        font-size: 14px;
        line-height: 40px;
        padding: 0;
        margin: 0;
        color: #ffff00;
        pointer-events:none;
    }
    </style>
    <script type="text/javascript">
    var _x_start,_y_start,_x_move,_y_move,_x_end,_y_end,left_start,top_start;
        document.getElementById("showimgA").addEventListener("touchstart",function(e)
        {
            _x_start=e.touches[0].pageX;
            _y_start=e.touches[0].pageY;
            left_start=$("#showimgA").css("left");
            top_start=$("#showimgA").css("top");
        })
        document.getElementById("showimgA").addEventListener("touchmove",function(e)
        {
            _x_move=e.touches[0].pageX;
            _y_move=e.touches[0].pageY;
            $("#showimgA").css("left",parseFloat(_x_move)-parseFloat(_x_start)+parseFloat(left_start)+"px");
            $("#showimgA").css("top",parseFloat(_y_move)-parseFloat(_y_start)+parseFloat(top_start)+"px");
        })
        document.getElementById("showimgA").addEventListener("touchend",function(e)
        {
            var _x_end=e.changedTouches[0].pageX;
            var _y_end=e.changedTouches[0].pageY;
        })
        
        
             document.getElementById("showimgA").addEventListener("mousedown",function(e)
        {
            _x_start=e.pageX;
            _y_start=e.pageY;
            left_start=$("#showimgA").css("left");
            top_start=$("#showimgA").css("top");
        })
        document.getElementById("showimgA").addEventListener("mousemove",function(e)
        {
            _x_move=e.pageX;
            _y_move=e.pageY;
            $("#showimgA").css("left",parseFloat(_x_move)-parseFloat(_x_start)+parseFloat(left_start)+"px");
            $("#showimgA").css("top",parseFloat(_y_move)-parseFloat(_y_start)+parseFloat(top_start)+"px");
        })
        document.getElementById("showimgA").addEventListener("mouseup",function(e)
        {
            var _x_end=e.pageX;
            var _y_end=e.pageY;
        })
        //阻止浏览器下拉事件
        $('body').on('touchmove', function (event) {event.preventDefault();});

    </script>
</body>
</html>
