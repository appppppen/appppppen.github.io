		<script type="text/javascript">
			function addFile() {
				location.href="seedweet://onOSSCtrlFile?type=btn_addFile&path="+obj[0];
			}
			function deleteFile() {
				location.href="seedweet://onOSSCtrlFile?type=btn_deleteFile&path="+obj[0];
			}
			function resumeFile() {
				location.href="seedweet://onOSSCtrlFile?type=btn_resumeFile&path="+obj[0];
			}
			function addFileThenStart() {
				location.href="seedweet://onOSSCtrlFile?type=btn_addFileThenStart&path="+obj[0];

			function cancelFile() {
				location.href="seedweet://onOSSCtrlFile?type=btn_cancelFile&path="+obj[0];

			// 返回文件列表
			var obj;
			function ReturnFilesName(str) {
				obj = JSON.parse(str);
				document.getElementById("pp").innerHTML += "<br/>ReturnFilesName:"+ obj[0]+" ---- "+ obj[1];
			}
			// 返回上传成功结果 onUploadSucceed(UploadFileInfo info)
			function onUploadSucceed(str) {
				document.getElementById("cc").innerHTML = "<br/>onUploadSucceed:"+ str;
			}
			// 返回上传失败结果 onUploadFailed(UploadFileInfo info, String code, String message)
			function onUploadFailed(str1,str2,str3) {
				document.getElementById("cc").innerHTML = "<br/>onUploadFailed:"+ str1;
			}
			// 返回上传进度 onUploadProgress(UploadFileInfo info, long uploadedSize, long totalSize)
			function onUploadProgress(str,long2) {
				document.getElementById("cc").innerHTML = "onUploadProgress:"+str+"="+ long2;
			}
			// 返回音量
			function ListenSoundWaves(str) {
				document.getElementById("IseVolume").innerHTML = "<br/>ReturnIseVolume:"+ str;
			}
			function gotoIp() {
				let ipText = document.querySelector('.ipText');
				window.location.href=ipText.value;
			}
			// 前台回调
			function appForeground() {
				document.getElementById("pp").innerHTML += "<br/>appForeground";
			}
			// 语言识别的内容回调
			function RecognizerResultReturn(str) {
				document.getElementById("Iat").innerHTML = "<br/>RecognizerResultReturn:" + str;
			}
			// 语言评测的内容回调
			function ReturnIseResult(str) {

			}
			// 语言评测的内容回调
			function ReturnIseUIResult(str,str2) {

			// 返回键回调
			function KeyCodeBackReturn() {

			}
			// 返回识别回调
			function RecognizerResultReturn(str) {
				document.getElementById("ff").innerHTML += "<br/>RecognizerResultReturn:"+str;
			}

			function RecognizerVideo(e) {
				var file = e.target.files[0];
				if(!file.type.match('video.*')) {
					return false;
				}
				var reader = new FileReader();
				reader.readAsDataURL(file);
				reader.onload = function(arg) {
					var img = '<video class="preview" src="' + arg.target.result + '" alt="preview"  autoplay="autoplay"/>';
					$(".preview_box").empty().append(img);
				}
			}
			$("#img_input").on("change", function(e) {

			});
