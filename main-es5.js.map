<header class="header">
  <a mat-button routerLink="/timeline"
  [fragment]="'bar-1'" >(#bar-1)</a>
  <a mat-button routerLink="/timeline" [fragment]="'bar-2'" [queryParams]="{'id':'s'}"  >(#bar-2)</a>
  <a mat-button routerLink="/timeline" [fragment]="'bar-3'" >(#bar-3)</a>
  <a mat-button routerLink="/timeline" [fragment]="'bar-4'" >(#bar-4)</a>
  <a mat-button routerLink="/timeline" [fragment]="'bar-5'" >(#bar-5)</a>
  <a mat-button routerLink="/timeline" [fragment]="'bar-6'" >(#bar-6)</a>
  <a mat-button routerLink="/timeline" [fragment]="'bar-7'" >(#bar-7)</a>
  <button mat-button (click)="locationBack()">Location Back</button>
  <button mat-button (click)="locationBackAngular()">Location Back (Angular)</button>
</header>
<ul>
  <li class="vh30" id="bar-1">1</li>
  <li class="vh30" id="bar-2">2</li>
  <li class="vh30" id="bar-3">3</li>
  <li class="vh30" id="bar-4">4</li>
  <li class="vh30" id="bar-5">5</li>
  <li class="vh30" id="bar-6">6</li>
  <li class="vh30" id="bar-7">7</li>
</ul>
