<mat-list>
  <mat-list-item style="height: 130px;"
  *ngFor="let blog of blogs; index as blogId">
  <div matRipple class="content" routerLink="/article" [queryParams]="{'id':blogId}">
    <div [ngStyle]="{
      'background-image': 'url(' + (blog.image===''?'https://appppppen.github.io/image/post-img.png':blog.image) + ')'
    }" class="bgImage" [title]="blog.description"></div>
    <div class="text-content">
      <h3 > {{blog.title}} </h3>
      <p >
        <span> {{blog.subtitle}} </span>
        <span class="demo-2">{{blog.description}} </span>
      </p>
    </div>

  </div>
  </mat-list-item>
</mat-list>
