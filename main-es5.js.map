<mat-toolbar color="primary" class="fixed-header">
  <mat-toolbar-row>
    <span class="header"><img routerLink="/" src="/assets/logo.png" style="width:50px;"></span>
      <div *ngIf="!ismob" class="tab">
        <span *ngFor="let item of routerLinks">
          <a class="link" mat-button [routerLink]="item.routerLink">{{item.title}}</a>
        </span>
      </div>
    <span class="spacer"></span>
    <span *ngIf="ismob">
      <button  mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
        <mat-icon>menu</mat-icon>
      </button>
    </span>
  </mat-toolbar-row>
</mat-toolbar>
<mat-menu #menu="matMenu">
  <button mat-menu-item *ngFor="let item of routerLinks" [routerLink]="item.routerLink">
    <mat-icon>{{item.icon}}</mat-icon>
    <span>{{item.title}}</span>
  </button>
</mat-menu>
