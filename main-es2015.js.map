<div class="articleleft fl" style="width: 75%;">
  <div class="header">
    <h1 class="title">{{articleDetail.title}}</h1>
    <div class="author">
      <div class="avatar">
        <img class="auth-logo" [src]="articleDetail.img_url" />
      </div>
      <div class="info">
        <span class="name">
          <span>{{articleDetail.author}}</span>
        </span>
        <div class="meta">
          <span class="wordage">字数 {{articleDetail.numbers}}</span>
          <span class="views-count">阅读 {{articleDetail.meta.views}}</span>
          <span class="comments-count">评论 {{articleDetail.meta.comments}}</span>
          <span class="likes-count">喜欢 {{articleDetail.meta.likes}}</span>
        </div>
      </div>
      <mat-chip-list class="tags" title="标签">
        <mat-chip  class="tag"
          *ngFor="let tag of articleDetail.tags"
        >{{tag.name}}</mat-chip>
      </mat-chip-list>
    </div>
  </div>
  <div class="article-detail" [innerHTML]="articleDetail.content"></div>
</div>
<div style="width: 23%" class="article-right fr anchor" [innerHTML]="articleDetail.toc"></div>
