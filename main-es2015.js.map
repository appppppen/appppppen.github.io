<div class="bg">© 2005-2020 Mozilla and individual contributors. Content is available under these licenses.</div>
<div class="swiper-container">
  <div class="swiper-wrapper">
    <div class="swiper-slide">
      <div [ngStyle]="{
            'background-image': 'url(' + 'https://appppppen.github.io/image/1.jpg' + ')'
        }" class="img">
      <div class="logo">
        Technical Arts
      </div>
      </div>
    </div>
    <div class="swiper-slide" *ngFor="let data of slides">
      <div [ngStyle]="{
            'background-image': 'url(' + (data.image===''?'https://appppppen.github.io/image/logo.png':data.image) + ')'
        }" class="img"></div>
    </div>
  </div>
  <div class="swiper-pagination"></div>
  <!-- <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div> -->
</div>
