<mat-card class="example-card"
  matRipple [matRippleTrigger]="trigger"
  [matRippleCentered]="centered"
  [matRippleDisabled]="disabled"
  [matRippleUnbounded]="unbounded"
  [matRippleRadius]="radius"
  [matRippleColor]="color"
  [title]="project.title + ' details'">
  <div #trigger mat-card-image [ngStyle]="{
    'background-image': 'url(' + (project.image===''?'https://appppppen.github.io/image/post-img.png':project.image) + ')'
  }" class="img" [title]="project.description"></div>
  <mat-card-content>
    <mat-card-title>{{project.title| truncate:['50']}}</mat-card-title>
    <mat-card-actions>
      <button mat-icon-button color="warn" (click)="like(id)">
        <mat-icon>favorite</mat-icon>
      </button>
      <button mat-icon-button (click)="notify.emit(id)" color="accent">
        <mat-icon>share</mat-icon>
      </button>
      <button mat-icon-button routerLink="/projectdetails" [queryParams]="{'id':id}" (click)="view(id)" color="primary"
        aria-label="Example icon button with a heart icon">
        <mat-icon>view_comfy</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card-content>

</mat-card>
