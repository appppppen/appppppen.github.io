<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>AR Hat</title>
    <link rel="stylesheet" type="text/css" href="css/app.css?t=2010422202430" />
</head>

<body>
<div class="wrapper">
    <div class="loadingStart" id="loadingStart">
        <div class="hand">
            <div class="thumb"></div>
            <div class="finger"></div>
            <div class="finger"></div>
            <div class="finger"></div>
            <div class="finger"></div>
        </div>
        <p>正在加载...越摔越快</p>
    </div>
    <div class="iosTip" id="iosTip"><img src="img/iOS-WxTip.png" alt=""></div>
    <!--相机-->
    <div class="videoBox">
        <video id="camera" autoplay></video>
    </div>
    <!--雷达-->
    <!--<div class="Radar" id="Radar"></div>-->
    <!--3d场景-->
    <div class="main" id="main"></div>
    <!--精度纬度三维-->
    
</div>
<script type="text/javascript">
    WebVRConfig = {
        BUFFER_SCALE: 0.5
    };


</script>
<!--es6-->
<script src="libs/babel.min.js" type="text/javascript" charset="utf-8"></script>
<!--2d几何图形-->
<script src="libs/konva.min.js" type="text/javascript" charset="utf-8"></script>
<!--3d几何图形-->
<script src="libs/ThreeJs/three.min.js" type="text/javascript" charset="utf-8"></script>
<script src="libs/ThreeJs/DeviceOrientationControls.js" type="text/javascript" charset="utf-8"></script>
<!--加载模型-->
<script src="libs/MTLLoader.js" type="text/javascript" charset="utf-8"></script>
<script src="libs/OBJLoader.js" type="text/javascript" charset="utf-8"></script>
<script src="libs/GLTFLoader.js" type="text/javascript" charset="utf-8"></script>
<!--compass-->
<script type="text/javascript" src="scripts/fulltilt.min.js"></script>
<!--项目js-->
<script src="js/app.js?t=201802222222"></script>
<script>
    
    var camera1, camera2, scene1, scene2, renderer, controls2,playBtn,cone,
        orientationData1 = null,
        loadingTimer = null,
        threeVideo=null,
        screenMatrix = null,
        model1 = null,
        model2 = null,
        worldMatrix = null;
    let box, x = null,
        y = null,
        z = null;
    if(!!navigator.userAgent.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/)){
        if(navigator.userAgent.indexOf('MicroMessenger') > -1 || navigator.userAgent.indexOf('QQ') > -1){
            document.getElementById('iosTip').style.display = 'block';
        }else{
            init();
            animate();
        }
    }else{
        init();
        animate();
    }

    function init() {
        //首先设置渲染器
        renderer = new THREE.WebGLRenderer({
            antialias: true, //开启抗锯齿效果
            alpha: true,	//可以设置背景色透明
        });
        //刷新画布的颜色
        renderer.setClearColor(0xFFFFFF,0);
        //设置canvas的像素比为当前设备的屏幕像素比，避免高分屏下模糊
        renderer.setPixelRatio(window.devicePixelRatio);
        //设置渲染器大小,即canvas画布的大小，设置为当前窗口的宽高
        renderer.setSize(window.innerWidth, window.innerHeight);
        //domElement元素表示渲染器中的画布，所有的渲染都是画在domElement上的，将这个domElement挂接在main下面
        document.getElementById('main').appendChild(renderer.domElement);
        //更新视图时关闭自动清除功能
        renderer.autoClear = false;
        //创建一个场景scene1（场景是一个容器，用于保存、跟踪所要渲染的物体和使用的光源）
        scene1 = new THREE.Scene();
        //添加场景2放模型
        scene2 = new THREE.Scene();
        camera2 = new THREE.PerspectiveCamera(100, window.innerWidth / window.innerHeight, 1, 10000);
        camera2.position.set(0,350,500);
        scene2.add(camera2);
        controls2 = new THREE.DeviceOrientationControls(camera2);

        addVideo();
        modelPut({
        	path:'model1/tongweisu',
        	name:'model1',
        	pos:[600,300,0],
        	scale:[6,6,6]
        })
       modelPut({
        	path:'model2/dog',
        	name:'model2',
           pos:[-1000,200,0],
           scale:[80,80,80],
        	imgPath:'model2/color.jpg'
        })
        

        var hemiLight = new THREE.HemisphereLight(0xffffff, 0xffffff, 0.6);
        hemiLight.position.set(0, 50, 0);
        scene2.add(hemiLight);

        var dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.color.setHSL(0.1, 1, 0.95);
        dirLight.position.set(-1, 1.75, 1);
        dirLight.position.multiplyScalar(30);
        scene2.add(dirLight);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        var d = 50;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.far = 3500;
        dirLight.shadow.bias = -0.0001;

        var dirLight1 = dirLight.clone();
        dirLight1.position.set(1, -1.75, -1);
        dirLight1.intensity = 0.4;
        scene2.add(dirLight1);
        //创建摄像机对象camera1（摄像机决定了能够在场景里看到什么）
        camera1 = new THREE.PerspectiveCamera(100, window.innerWidth / window.innerHeight, 1, 10000);
        //设置摄像机的位置，并让其指向场景的中心（0,0,0）
        camera1.position.set(0, 350, 500);
        //将摄像机camera1加入场景scene1中
        scene1.add(camera1);
        //指南针
        var materialArray = [];
        materialArray.push(new THREE.MeshBasicMaterial({ map: THREE.ImageUtils.loadTexture('./img/w.png') ,transparent:true}));
        materialArray.push(new THREE.MeshBasicMaterial({ map: THREE.ImageUtils.loadTexture('./img/e.png') ,transparent:true}));
        materialArray.push(new THREE.MeshBasicMaterial({ map: THREE.ImageUtils.loadTexture('./img/s.png') ,transparent:true}));
        materialArray.push(new THREE.MeshBasicMaterial({ map: THREE.ImageUtils.loadTexture('./img/n.png') ,transparent:true}));
        materialArray.push(new THREE.MeshBasicMaterial({ map: THREE.ImageUtils.loadTexture('./img/cpmpassbai.png'),transparent:true }));
        materialArray.push(new THREE.MeshBasicMaterial({ map: THREE.ImageUtils.loadTexture('./img/cpmpassbai-fan.png'),transparent:true }));
        var skyboxMaterial = new THREE.MeshFaceMaterial(materialArray);
        var skyboxGeom = new THREE.CubeGeometry(350, 350, 0.01, 1, 1, 1);
        box = new THREE.Mesh(skyboxGeom, skyboxMaterial);
        scene1.add(box);

        //箭头cone
        var conelight = new THREE.DirectionalLight( 0xFFFFFF );
        conelight.position.set(0,200,300);
        scene1.add( conelight );

        let num  =80;
        var coneShape = new THREE.Shape();
        coneShape.moveTo(0,num);
        coneShape.lineTo(-num/1.1,-num);
        coneShape.lineTo(0,-num+30);
        coneShape.lineTo(num/1.1,-num);
        coneShape.lineTo(0,num);

        var options = {
            amount:12,
            bevelEnabled:false,
        }
        var shape = new THREE.ExtrudeGeometry(coneShape,options);
        var conematerial = new THREE.MeshPhongMaterial({color:0x00FEC5});
        cone = new THREE.Mesh(shape,conematerial);
        cone.position.set(0,40,20)
        scene1.add(cone);


        renderer.render(scene1, camera1);
        screenMatrix = new THREE.Matrix4();
        screenMatrix.identity(this.screenMatrix);
        var inv = THREE.Math.degToRad(180);
        screenMatrix[0] = Math.cos(inv);
        screenMatrix[1] = Math.sin(inv);
        screenMatrix[4] = -Math.sin(inv);
        screenMatrix[5] = Math.cos(inv);
        worldMatrix = new THREE.Matrix4();
        worldMatrix.identity(this.worldMatrix);
        var up = THREE.Math.degToRad(90);
        worldMatrix[5] = Math.cos(up);
        worldMatrix[6] = Math.sin(up);
        worldMatrix[9] = -Math.sin(up);
        worldMatrix[10] = Math.cos(up);
        orientationData1 = new FULLTILT.DeviceOrientation({ 'type': 'world' });
        orientationData1.start();



        window.addEventListener('resize', onWindowResize, false);
    }

    function hideLoading(end) {
        clearTimeout(loadingTimer);
        loadingTimer = setTimeout(()=>{
            console.log('end',end)
            if(end){
                document.getElementById('loadingStart').style.display = 'none';
            }
        },900)
    }

    function startPlay(){

        if(threeVideo ){
            threeVideo.play();
        }
    }


    //添加模型
    function addVideo() {
        let ua = navigator.userAgent.toLowerCase();
        if(ua.indexOf('android') !== -1){return};
        threeVideo = document.createElement( 'video' );
        threeVideo.crossOrigin = 'anonymous';
        threeVideo.loop = true;
        threeVideo.preload = 'auto';
        threeVideo.width = 1280;
        threeVideo.height = 720;
//        threeVideo.muted = true;
        threeVideo.src = 'video/ar.mp4';
        threeVideo.setAttribute('x5-video-player-type','h5')
        threeVideo.setAttribute('playsinline','true')
        threeVideo.setAttribute('x5-playsinline','true')
        threeVideo.setAttribute('preload','auto')
        threeVideo.setAttribute('webkit-playsinline','true')
        threeVideo.setAttribute('x-webkit-airplay','true')

        var texture = new THREE.VideoTexture( threeVideo );
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.format = THREE.RGBFormat;

        var parameters = { map:texture};
        var videoMaterial = new THREE.MeshBasicMaterial( parameters );
        var videoGeometry = new THREE.PlaneGeometry(128*5,72*5);
        var videoMesh = new THREE.Mesh( videoGeometry, videoMaterial );
        videoMesh.position.set(0,700,-100);
        scene2.add(videoMesh);

        var playGeometry = new THREE.PlaneGeometry(128*5,72*5);
        var playmaterial = new THREE.MeshBasicMaterial({
            map: new THREE.TextureLoader().load('img/videoPlay.png'),
            transparent: true,
            depthTest: false
        });
        playBtn = new THREE.Mesh(playGeometry, playmaterial);
        playBtn.position.set(0,700,-100)
        scene2.add(playBtn);

        threeVideo.addEventListener('timeupdate',()=>{
            if(threeVideo.currentTime>0.5){
                scene2.remove(playBtn);
            }
        })

        document.getElementById('main').addEventListener( 'touchstart', playVideo, false );

    }

    function playVideo(e) {
        let a = e.touches[0]
        let mouse = {};
        mouse.x = ( a.clientX / renderer.domElement.clientWidth ) * 2 - 1;
        mouse.y = - ( a.clientY / renderer.domElement.clientHeight ) * 2 + 1;
        var raycaster = new THREE.Raycaster();
        raycaster.setFromCamera( mouse, camera2 );

        var intersects = raycaster.intersectObject( playBtn );
        if ( intersects.length > 0 ) {
            startPlay();
        }
    }
    function modelPut(info) {
    	let pos = info.pos || [0,0,0],scale=info.scale || [1,1,1];
    	let name = info.name;
        let obj = info.path+'.obj',mtl = info.path+'.mtl';
        let texture;
        if(info.imgPath){
        	texture = new THREE.TextureLoader().load('models/'+info.imgPath);
        }
        var onProgress = function(xhr) {
            if (xhr.lengthComputable) {
                var percentComplete = xhr.loaded / xhr.total * 100;
                console.log(Math.round(percentComplete, 2) + '% downloaded');
                hideLoading(Math.round(percentComplete, 2));
            }
        };
        var onError = function(xhr) {};
        var mtlLoader = new THREE.MTLLoader();
        mtlLoader.setPath('models/');
        mtlLoader.load(mtl, function(materials) {
            materials.preload();
            var objLoader = new THREE.OBJLoader();
            objLoader.setMaterials(materials);
            objLoader.setPath('models/');
            objLoader.load(obj, function(object) {
            	if(info.imgPath){
            		let childrens = object.children;
	            	for(let i =0;i<childrens.length;i++){
	            		childrens[i].material = new THREE.MeshPhongMaterial({
	            			map:texture,
	            		})
            		}
            	}
                object.position.set(pos[0],pos[1],pos[2]);
                object.scale.set(scale[0],scale[1],scale[2]);
                if(info.rotation){
                	object.rotation.set(info.rotation[0],info.rotation[1],info.rotation[2]);
                }
                scene2.add(object)
                window[name] = object;
            }, onProgress, onError);
        });
    }


    function deviceOrientationListener() {
        let alpha = event.webkitCompassHeading || event.alpha, //Z轴方向
            beta = event.beta, //X轴方向
            gamma = event.gamma; //Y轴方向
        z = alpha;
        x = beta;
        y = gamma;
        var orientationMatrix = orientationData1.getScreenAdjustedMatrix();
        var rotationMatrix = new THREE.Matrix4();
        rotationMatrix.identity(rotationMatrix);
        rotationMatrix.elements[0] = orientationMatrix.elements[0];
        rotationMatrix.elements[1] = orientationMatrix.elements[1];
        rotationMatrix.elements[2] = orientationMatrix.elements[2];
        rotationMatrix.elements[4] = orientationMatrix.elements[3];
        rotationMatrix.elements[5] = orientationMatrix.elements[4];
        rotationMatrix.elements[6] = orientationMatrix.elements[5];
        rotationMatrix.elements[8] = orientationMatrix.elements[6];
        rotationMatrix.elements[9] = orientationMatrix.elements[7];
        rotationMatrix.elements[10] = orientationMatrix.elements[8];
        rotationMatrix.multiplyMatrices(rotationMatrix, screenMatrix);
        rotationMatrix.multiplyMatrices(rotationMatrix, worldMatrix);

        box.rotation.setFromRotationMatrix(rotationMatrix);
        box.rotationZ = Math.PI * 0.5;
        box.rotationX = -Math.PI * 0.5;

        cone.rotation.setFromRotationMatrix(rotationMatrix);
        cone.rotationZ = Math.PI * 0.5;
        cone.rotationX = -Math.PI * 0.5;

    }
    if (window.DeviceOrientationEvent) { //返回一个DeviceOrientationEvent对象
        window.addEventListener('deviceorientation', deviceOrientationListener, false); ///添加监听事件
    } else {
        alert("您的浏览器不支持DeviceOrientation");
    }

    function animate() {
        window.requestAnimationFrame(animate);
        controls2.update();
        renderer.clear();
        renderer.render(scene2, camera2);
        renderer.render(scene1, camera1);
        if(model1){
            model1.rotation.x +=0.01;
            model1.rotation.y +=0.01;
            model1.rotation.z -=0.01;
        }
         if(model2){
            model2.rotation.y +=0.01;
        }

    }

    function onWindowResize() {
        camera1.aspect = window.innerWidth / window.innerHeight;
        camera1.updateProjectionMatrix();
        if(camera2){
            camera2.aspect = window.innerWidth / window.innerHeight;
            camera2.updateProjectionMatrix();
        }
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>

</html>
